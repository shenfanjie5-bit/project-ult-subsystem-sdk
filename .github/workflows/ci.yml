name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # `ci` lane = the 5-lane template's `full(ci)` umbrella: installs every
  # extra so the full pytest collection (incl. tests/regression which
  # hard-imports audit_eval_fixtures per iron rule #1, and tests/contract
  # which hard-imports contracts.schemas per iron rule #4) actually runs.
  # Per stage-2 plan 5-lane semantics: test-fast/smoke ([dev]) /
  # contract ([dev,contracts-schemas]) / regression ([dev,shared-fixtures])
  # / full(ci) ([dev,contracts-schemas,shared-fixtures]).
  # contracts-schemas extra pins project-ult-contracts @ v0.1.2 (iron rule #6);
  # shared-fixtures extra pins project-ult-audit-eval @ v0.2.1 (iron rule #6).
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (full(ci) lane — all extras: dev + contracts-schemas + shared-fixtures)
        run: pip install -e ".[dev,contracts-schemas,shared-fixtures]"
      - name: Tests
        run: python -m pytest

  # Stage-2 plan canonical lanes:
  # - test-fast and smoke install only [dev] (offline-first per
  #   SUBPROJECT_TESTING_STANDARD §2.2). They still need contracts for
  #   the subsystem_sdk package to import; CI installs from the pinned
  #   tag (iron rule #6).
  # - contract installs [contracts-schemas] for cross-repo alignment.
  # - regression installs [shared-fixtures] for real audit_eval_fixtures.
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts pinned, iron rule #6)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.2"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: test-fast (unit + boundary)
        run: python -m pytest tests/unit tests/boundary -q

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts pinned, iron rule #6)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.2"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: smoke
        run: python -m pytest tests/smoke -q

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with cross-repo contracts-schemas extra, iron rule #6)
        run: pip install -e ".[dev,contracts-schemas]"
      - name: contract (incl. cross-repo alignment)
        run: python -m pytest tests/contract -q

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cross-project dep (contracts pinned, iron rule #6)
        run: pip install "git+https://github.com/shenfanjie5-bit/project-ult-contracts.git@v0.1.2"
      - name: Install (with shared-fixtures git extra, iron rule #6)
        run: pip install -e ".[dev,shared-fixtures]"
      - name: regression (must really consume audit_eval_fixtures)
        run: python -m pytest tests/regression -q
